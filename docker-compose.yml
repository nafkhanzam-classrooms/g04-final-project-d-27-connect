version: '3.8'

services:
  tcp-backend:
    build: .
    command: python server.py
    ports:
      - "5000:5000"
    environment:
      - TCP_HOST=0.0.0.0
      - TCP_PORT=5000
      - DB_PATH=/app/data/stealthnet.db
    volumes:
      - stealthnet_data:/app/data

  ws-proxy:
    build: .
    command: python ws_proxy.py
    ports:
      - "8080:8080"
    environment:
      - TCP_HOST=tcp-backend
      - TCP_PORT=5000
      - WS_HOST=0.0.0.0
      - WS_PORT=8080
    depends_on:
      - tcp-backend

  web-ui:
    build:
      context: ./client/web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - ws-proxy

volumes:
  stealthnet_data:
