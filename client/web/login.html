<!-- STITCH_SHADER_START:ANIMATION_37 class="absolute inset-0 w-full h-full -z-10 opacity-80 mix-blend-screen" -->
<div class="absolute inset-0 w-full h-full -z-10 opacity-80 mix-blend-screen" style="display:block;">
<canvas id="shader-canvas-ANIMATION_37" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_37');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
varying vec2 v_texCoord;

void main() {
    vec2 uv = v_texCoord;
    
    // Smooth organic movement for background orbs
    vec2 p1 = vec2(0.5 + 0.3 * sin(u_time * 0.4), 0.5 + 0.2 * cos(u_time * 0.5));
    vec2 p2 = vec2(0.2 + 0.2 * cos(u_time * 0.3), 0.8 + 0.1 * sin(u_time * 0.6));
    vec2 p3 = vec2(0.8 + 0.1 * sin(u_time * 0.7), 0.2 + 0.3 * cos(u_time * 0.4));
    
    float d1 = length(uv - p1);
    float d2 = length(uv - p2);
    float d3 = length(uv - p3);
    
    // StealthNet Palette: Deep Midnight (#051424), Electric Violet (#8b5cf6), Neon Cyan (#22d3ee)
    vec3 midnight = vec3(0.02, 0.08, 0.14); 
    vec3 violet = vec3(0.54, 0.36, 0.96);   
    vec3 cyan = vec3(0.13, 0.83, 0.93);     
    
    // Blend layers with smoothstep for soft glowing edges
    float f1 = smoothstep(0.7, 0.0, d1);
    float f2 = smoothstep(0.6, 0.0, d2);
    float f3 = smoothstep(0.8, 0.0, d3);
    
    vec3 color = midnight;
    color = mix(color, violet, f1 * 0.4);
    color = mix(color, cyan, f2 * 0.3);
    color = mix(color, violet, f3 * 0.2);
    
    // Fine-grain noise for a high-end textured look
    float noise = fract(sin(dot(uv, vec2(12.9898, 78.233))) * 43758.5453);
    color += noise * 0.012;
    
    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<!-- Interactive Logic -->
<script>
        let currentMode = 'signin';

        function setMode(mode) {
            if (currentMode === mode) return;
            currentMode = mode;

            const pill = document.getElementById('toggle-pill');
            const btnSignin = document.getElementById('btn-signin');
            const btnRegister = document.getElementById('btn-register');
            const confirmWrapper = document.getElementById('confirm-pass-wrapper');
            const confirmInput = document.getElementById('confirm-passphrase');
            const alertBox = document.getElementById('auth-alert');

            // Reset alert state on mode switch
            alertBox.classList.add('hidden');
            alertBox.classList.remove('opacity-100', 'translate-y-0');
            alertBox.classList.add('opacity-0', '-translate-y-2');

            if (mode === 'register') {
                pill.style.transform = 'translateX(100%)';
                btnSignin.classList.replace('text-secondary', 'text-on-surface-variant');
                btnRegister.classList.replace('text-on-surface-variant', 'text-secondary');
                
                // Show confirm field
                confirmWrapper.classList.remove('hidden');
                // Small delay to allow display:flex to apply before animating opacity/height
                setTimeout(() => {
                    confirmWrapper.classList.replace('opacity-0', 'opacity-100');
                    confirmWrapper.classList.replace('h-0', 'h-[58px]'); // Approx height of input
                    confirmWrapper.classList.add('mt-4');
                }, 10);
                confirmInput.setAttribute('required', 'true');

            } else {
                pill.style.transform = 'translateX(0)';
                btnRegister.classList.replace('text-secondary', 'text-on-surface-variant');
                btnSignin.classList.replace('text-on-surface-variant', 'text-secondary');
                
                // Hide confirm field
                confirmWrapper.classList.replace('opacity-100', 'opacity-0');
                confirmWrapper.classList.replace('h-[58px]', 'h-0');
                confirmWrapper.classList.remove('mt-4');
                
                setTimeout(() => {
                    confirmWrapper.classList.add('hidden');
                }, 300); // Wait for transition
                confirmInput.removeAttribute('required');
                confirmInput.value = '';
            }
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function handleAuth(event) {
            event.preventDefault();
            
            const btn = event.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span>`;
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('passphrase').value;
            
            const ws = new WebSocket('ws://' + window.location.hostname + ':8080/');
            
            ws.onopen = () => {
                const op = currentMode === 'signin' ? 'LOGIN' : 'REGISTER';
                ws.send(JSON.stringify({
                    type: op,
                    username: user,
                    password: pass
                }));
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'LOGIN_SUCCESS') {
                    // Save to session storage for other pages (tab-isolated)
                    sessionStorage.setItem('stealthnet_user', user);
                    sessionStorage.setItem('stealthnet_pass', pass);
                    // Redirect to chat page
                    window.location.href = 'chat.html?v=' + new Date().getTime();
                } else if (data.type === 'ERROR') {
                    const alertBox = document.getElementById('auth-alert');
                    alertBox.querySelector('span:nth-child(2)').innerText = data.message;
                    alertBox.classList.remove('hidden');
                    
                    void alertBox.offsetWidth; // trigger reflow
                    
                    alertBox.classList.remove('opacity-0', '-translate-y-2');
                    alertBox.classList.add('opacity-100', 'translate-y-0');
                    btn.innerHTML = originalContent;
                }
            };
            
            ws.onerror = () => {
                const alertBox = document.getElementById('auth-alert');
                alertBox.querySelector('span:nth-child(2)').innerText = "Error: Connection Refused";
                alertBox.classList.remove('hidden');
                
                void alertBox.offsetWidth;
                
                alertBox.classList.remove('opacity-0', '-translate-y-2');
                alertBox.classList.add('opacity-100', 'translate-y-0');
                btn.innerHTML = originalContent;
            };
        }
    </script>
